<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret 💌</title>
    <style>
        body { background-color: #e6e6ff; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { background: white; padding: 40px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; width: 350px; position: relative; }
        img { width: 250px; height: 250px; object-fit: cover; border-radius: 15px; margin-bottom: 20px; }
        h1 { color: #555; font-size: 1.2rem; margin-bottom: 30px; min-height: 3.5rem; }
        input { width: 80%; padding: 12px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; outline: none; text-align: center; }
        textarea { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #ddd; outline: none; text-align: center; font-family: inherit; resize: none; display: none; }
        .btn { padding: 12px 25px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background-color: #b3b3ff; color: white; transition: 0.3s; width: 100%; }
        .btn:hover { background-color: #9999ff; }
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%; }
        .row-btns { display: flex; gap: 10px; width: 100%; }
        #noBtn { background-color: #ffb3b3; display: none; } 
        #noBtn:hover { background-color: #ff9999; }
        #submitMsgBtn { display: none; }
    </style>
</head>
<body>

<audio id="happyMusic"><source src="https://www.myinstants.com/media/sounds/happy-happy-happy-song.mp3" type="audio/mpeg"></audio>
<audio id="sadMusic"><source src="https://www.myinstants.com/media/sounds/sad-meow-song.mp3" type="audio/mpeg"></audio>

<div class="card" id="loginCard">
    <h1>HI 😊</h1>
    <input type="text" id="userName" placeholder="Enter your name..." autocomplete="off">
    <button class="btn" onclick="startApp()">Enter</button>
</div>

<div class="card" id="mainCard" style="display:none;">
    <img id="displayImg" src="https://media.giphy.com/media/6hKL8BI8rRNrMRFtAx/giphy.gif">
    <h1 id="text">Hi!</h1>
    
    <textarea id="messageInput" rows="3" placeholder="Sulat ka dito..."></textarea>
    
    <div class="btn-container">
        <div class="row-btns" id="actionButtons">
            <button id="mainBtn" class="btn" onclick="nextStep()">tap tap</button>
            <button id="noBtn" class="btn" onclick="handleChoice('NO')">No</button>
        </div>
        <button id="submitMsgBtn" class="btn" onclick="finalSubmit()">Send Message</button>
    </div>
</div>

<script>
    let step = 0;
    let userName = "";
    let savedAnswer = "";

    const steps = [
        { text: "Wait lang... may itatanong sana ako.", img: "https://media.giphy.com/media/BNlSrpW0e4nbgVZ2we/giphy.gif", btn: "Ano yun?" },
        { text: "Diba since ano...", img: "https://media.giphy.com/media/LBb735fuQwRKAVzN23/giphy.gif", btn: "Next" },
        { text: "Next page pa haha", img: "https://media.giphy.com/media/pY8jLmZw0ElqvVeRH4/giphy.gif", btn: "Next" },
        { text: "Pwede ba tayo lumabas kapag free ka?", img: "https://media.giphy.com/media/pY8jLmZw0ElqvVeRH4/giphy.gif", btn: "Yes! ❤️" }
    ];

    function startApp() {
        const inputVal = document.getElementById('userName').value.trim();
        if (inputVal.toLowerCase() === "admin") {
            const pass = prompt("Verification required:");
            if (pass === "12345") { window.location.href = "https://formspree.io/forms"; return; }
            else { alert("Unauthorized!"); return; }
        }
        if (inputVal !== "") {
            userName = inputVal;
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('mainCard').style.display = 'block';
            document.getElementById('text').innerText = "Hi " + userName + "!";
        }
    }

    function nextStep() {
        const textElement = document.getElementById('text');
        const imgElement = document.getElementById('displayImg');
        const mainBtn = document.getElementById('mainBtn');
        const noBtn = document.getElementById('noBtn');

        if (step < steps.length) {
            textElement.innerHTML = steps[step].text;
            imgElement.src = steps[step].img;
            mainBtn.innerHTML = steps[step].btn;
            
            if (step === steps.length - 1) {
                noBtn.style.display = 'block';
                // Change Yes button to call the handleChoice function
                mainBtn.onclick = () => handleChoice('YES');
            }
            step++;
        }
    }

    function handleChoice(choice) {
        savedAnswer = choice;
        const textElement = document.getElementById('text');
        const imgElement = document.getElementById('displayImg');
        const actionButtons = document.getElementById('actionButtons');
        const msgInput = document.getElementById('messageInput');
        const submitBtn = document.getElementById('submitMsgBtn');

        // Hide original buttons
        actionButtons.style.display = 'none';
        
        // Show Message box and New Submit button
        msgInput.style.display = 'block';
        submitBtn.style.display = 'block';

        if (choice === 'YES') {
            textElement.innerHTML = "Yon ohhh! ❤️ <br> Flowers for you 🌼";
            imgElement.src = "https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYng0ZHNzMWdhM2o0NXZkaXBtM2N2MHJwaDU5YTlicGFxeHdhZ2VnaiZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/T70hpBP1L0N7U0jtkq/giphy.gif";
            document.getElementById('happyMusic').play();
        } else {
            textElement.innerHTML = "Aray mo, pakak... <br> Bakit naman? (Baka lang may reason haha)";
            imgElement.src = "https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExcWNmc2UyeTZoZzM1bzI3ZHBubTNnNXZ1aDJicjBzMXI0aHQ5d2ZsYSZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/lGBecpB2dIMwt6ohfI/giphy.gif";
            document.getElementById('sadMusic').play();
        }
    }

    function finalSubmit() {
        const customMsg = document.getElementById('messageInput').value;
        const submitBtn = document.getElementById('submitMsgBtn');
        
        submitBtn.innerText = "Sending...";
        submitBtn.disabled = true;

        fetch('https://formspree.io/f/mdawvqle', {
            method: 'POST',
            body: JSON.stringify({
                name: userName,
                answer: savedAnswer,
                message: customMsg || "(No message provided)"
            }),
            headers: { 'Content-Type': 'application/json' }
        }).finally(() => {
            if (savedAnswer === 'YES') {
                window.location.href = "flowers-main/index.html";
            } else {
                document.getElementById('text').innerHTML = "Message sent. <br> Longkowt 😢";
                document.getElementById('messageInput').style.display = 'none';
                submitBtn.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
